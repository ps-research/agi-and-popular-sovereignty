name: figures

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-figures:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Julia 1.12
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Instantiate Julia environment
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Fetch dataset from Zenodo
        run: ./data/fetch.sh

      - name: Generate all figures
        run: make all JULIA_THREADS=2

      - name: Upload figure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper1-figures
          path: figures/
          if-no-files-found: error
